<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, system-ui, sans-serif; font-size: 13px; color: #333; padding: 16px; }
    h2 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
    label { display: block; font-size: 11px; font-weight: 500; color: #666; margin-bottom: 4px; }
    input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; margin-bottom: 12px; }
    input:focus { outline: none; border-color: #5b5bff; }
    button { width: 100%; padding: 10px; background: #5b5bff; color: white; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; }
    button:hover { background: #4a4ae0; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    #status { margin-top: 12px; font-size: 12px; color: #666; min-height: 20px; }
    .error { color: #dc2626; }
    .success { color: #16a34a; }
  </style>
</head>
<body>
  <h2>Graffiticode</h2>

  <label for="item-id">Item ID</label>
  <input type="text" id="item-id" placeholder="e.g. 2FGK3MRsba" />

  <label for="access-token">Access Token</label>
  <input type="text" id="access-token" placeholder="Bearer token" />

  <button id="draw-btn">Draw</button>

  <div id="status"></div>

  <script>
    const itemIdInput = document.getElementById('item-id');
    const tokenInput = document.getElementById('access-token');
    const drawBtn = document.getElementById('draw-btn');
    const status = document.getElementById('status');

    drawBtn.addEventListener('click', async () => {
      const itemId = itemIdInput.value.trim();
      const token = tokenInput.value.trim();

      if (!itemId) {
        status.className = 'error';
        status.textContent = 'Please enter an item ID.';
        return;
      }

      drawBtn.disabled = true;
      status.className = '';
      status.textContent = 'Fetching...';

      try {
        const url = `https://api.graffiticode.org/data?id=${encodeURIComponent(itemId)}` +
          (token ? `&access_token=${encodeURIComponent(token)}` : '');
        const resp = await fetch(url);
        if (!resp.ok) {
          throw new Error(`API returned ${resp.status}`);
        }
        const data = await resp.json();
        const source = data?._ ?? data;
        parent.postMessage({ pluginMessage: { type: 'draw', data: source } }, '*');
      } catch (err) {
        status.className = 'error';
        status.textContent = `Error: ${err.message}`;
        drawBtn.disabled = false;
      }
    });

    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;
      drawBtn.disabled = false;

      if (msg.type === 'draw-complete') {
        status.className = 'success';
        status.textContent = `Created ${msg.count} ellipse(s).`;
      } else if (msg.type === 'error') {
        status.className = 'error';
        status.textContent = msg.message;
      }
    };
  </script>
</body>
</html>
