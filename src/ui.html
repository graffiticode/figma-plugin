<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, system-ui, sans-serif; font-size: 13px; color: #333; padding: 16px; }
    h2 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
    label { display: block; font-size: 11px; font-weight: 500; color: #666; margin-bottom: 4px; }
    input[type=text], input[type=password] { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; margin-bottom: 12px; }
    input:focus { outline: none; border-color: #5b5bff; }
    button { padding: 10px; background: #5b5bff; color: white; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; }
    button:hover { background: #4a4ae0; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    button.full { width: 100%; }
    button.small { padding: 6px 10px; font-size: 12px; }
    button.ghost { background: transparent; color: #888; padding: 4px 8px; }
    button.ghost:hover { background: #f3f3f3; color: #dc2626; }
    button.danger { background: #dc2626; color: white; padding: 4px 8px; font-size: 12px; }
    button.danger:hover { background: #b91c1c; }
    .add-row { display: flex; gap: 6px; margin-bottom: 12px; }
    .add-row input { margin-bottom: 0; }
    .items { list-style: none; margin-bottom: 12px; max-height: 180px; overflow-y: auto; }
    .item { display: flex; align-items: center; gap: 8px; padding: 6px 4px; border-bottom: 1px solid #f0f0f0; }
    .item:last-child { border-bottom: none; }
    .item-id { flex: 1; font-family: ui-monospace, monospace; font-size: 12px; }
    .empty { color: #999; font-style: italic; padding: 12px 0; text-align: center; }
    #status { margin-top: 12px; font-size: 12px; color: #666; min-height: 20px; }
    .error { color: #dc2626; }
    .success { color: #16a34a; }
  </style>
</head>
<body>
  <h2>Graffiticode</h2>

  <label>API Key</label>
  <div id="api-key-row" style="margin-bottom: 12px;">
    <div id="api-key-input-row" style="display: flex; gap: 6px;">
      <input type="password" id="api-key" placeholder="Graffiticode API key" style="margin-bottom: 0;" />
      <button id="set-key-btn" class="small">Set</button>
    </div>
    <div id="api-key-set" style="display: none; align-items: center; justify-content: space-between; padding: 8px; border: 1px solid #ddd; border-radius: 6px;">
      <span style="color: #16a34a;">&#10003; API key set</span>
      <span id="api-key-actions" style="display: flex; gap: 4px;"></span>
    </div>
  </div>

  <label>Items</label>
  <div class="add-row">
    <input type="text" id="new-item-id" placeholder="Add item ID" />
    <button id="add-btn" class="small">Add</button>
  </div>
  <ul id="items" class="items"></ul>

  <button id="draw-btn" class="full">Watch</button>

  <div id="status"></div>

  <script>
    const AUTH_URL = 'https://auth.graffiticode.org';
    const CONSOLE_API_URL = 'https://console.graffiticode.org/api';
    const FIREBASE_API_KEY = 'AIzaSyAoVuUNi8ElnS7cn6wc3D8XExML-URLw0I';
    const POLL_INTERVAL = 3000;

    const apiKeyInput = document.getElementById('api-key');
    const apiKeyInputRow = document.getElementById('api-key-input-row');
    const apiKeySet = document.getElementById('api-key-set');
    const apiKeyActions = document.getElementById('api-key-actions');
    const setKeyBtn = document.getElementById('set-key-btn');
    const newItemInput = document.getElementById('new-item-id');
    const addBtn = document.getElementById('add-btn');
    const itemsEl = document.getElementById('items');
    const drawBtn = document.getElementById('draw-btn');
    const status = document.getElementById('status');

    let items = []; // [{id, checked}]
    let storedApiKey = '';
    let pollTimer = null;
    const lastDataJson = {}; // itemId -> json

    function setApiKeyDisplay(key) {
      storedApiKey = key || '';
      if (storedApiKey) {
        apiKeyInputRow.style.display = 'none';
        apiKeyInput.value = '';
        apiKeySet.style.display = 'flex';
        showClearDefault();
      } else {
        apiKeyInputRow.style.display = 'flex';
        apiKeySet.style.display = 'none';
      }
    }

    function showClearDefault() {
      apiKeyActions.innerHTML = '';
      const clearBtn = document.createElement('button');
      clearBtn.className = 'ghost small';
      clearBtn.textContent = 'Clear';
      clearBtn.disabled = !!pollTimer;
      clearBtn.addEventListener('click', showClearConfirm);
      apiKeyActions.appendChild(clearBtn);
    }

    function showClearConfirm() {
      apiKeyActions.innerHTML = '';
      const confirmBtn = document.createElement('button');
      confirmBtn.className = 'danger small';
      confirmBtn.textContent = 'Clear';
      confirmBtn.addEventListener('click', () => {
        parent.postMessage({ pluginMessage: { type: 'clear-api-key' } }, '*');
        cachedToken = null;
        tokenExpiresAt = 0;
        setApiKeyDisplay('');
      });
      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'ghost small';
      cancelBtn.textContent = 'Cancel';
      cancelBtn.addEventListener('click', showClearDefault);
      apiKeyActions.appendChild(confirmBtn);
      apiKeyActions.appendChild(cancelBtn);
    }

    setKeyBtn.addEventListener('click', () => {
      const key = apiKeyInput.value.trim();
      if (!key) {
        status.className = 'error';
        status.textContent = 'Please enter an API key.';
        return;
      }
      parent.postMessage({ pluginMessage: { type: 'save-api-key', apiKey: key } }, '*');
      setApiKeyDisplay(key);
      status.className = '';
      status.textContent = '';
    });

    apiKeyInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') setKeyBtn.click();
    });

    let cachedToken = null;
    let tokenExpiresAt = 0;

    function persistItems() {
      parent.postMessage({ pluginMessage: { type: 'save-items', items } }, '*');
    }

    function renderItems() {
      itemsEl.innerHTML = '';
      if (items.length === 0) {
        const li = document.createElement('li');
        li.className = 'empty';
        li.textContent = 'No items yet';
        itemsEl.appendChild(li);
        return;
      }
      items.forEach((item, idx) => {
        const li = document.createElement('li');
        li.className = 'item';

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = item.checked;
        cb.disabled = !!pollTimer;
        cb.addEventListener('change', () => {
          items[idx].checked = cb.checked;
          if (!cb.checked) {
            delete lastDataJson[item.id];
            parent.postMessage({ pluginMessage: { type: 'remove-item-nodes', itemId: item.id } }, '*');
          }
          persistItems();
        });

        const label = document.createElement('span');
        label.className = 'item-id';
        label.textContent = item.id;

        const actions = document.createElement('span');
        actions.style.display = 'flex';
        actions.style.gap = '4px';

        function showDefault() {
          actions.innerHTML = '';
          const del = document.createElement('button');
          del.className = 'ghost small';
          del.textContent = '\u00d7';
          del.title = 'Remove';
          del.disabled = !!pollTimer;
          del.addEventListener('click', showConfirm);
          actions.appendChild(del);
        }

        function showConfirm() {
          actions.innerHTML = '';
          const confirmBtn = document.createElement('button');
          confirmBtn.className = 'danger small';
          confirmBtn.textContent = 'Delete';
          confirmBtn.addEventListener('click', () => {
            const removed = items.splice(idx, 1)[0];
            delete lastDataJson[removed.id];
            parent.postMessage({ pluginMessage: { type: 'remove-item-nodes', itemId: removed.id } }, '*');
            persistItems();
            renderItems();
          });
          const cancelBtn = document.createElement('button');
          cancelBtn.className = 'ghost small';
          cancelBtn.textContent = 'Cancel';
          cancelBtn.addEventListener('click', showDefault);
          actions.appendChild(confirmBtn);
          actions.appendChild(cancelBtn);
        }

        showDefault();

        li.appendChild(cb);
        li.appendChild(label);
        li.appendChild(actions);
        itemsEl.appendChild(li);
      });
    }

    addBtn.addEventListener('click', () => {
      const id = newItemInput.value.trim();
      if (!id) return;
      if (items.some(i => i.id === id)) {
        status.className = 'error';
        status.textContent = 'Item already in list.';
        return;
      }
      items.push({ id, checked: true });
      newItemInput.value = '';
      persistItems();
      renderItems();
    });

    newItemInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addBtn.click();
    });

    async function getIdToken(apiKey) {
      const now = Date.now();
      if (cachedToken && tokenExpiresAt > now + 5 * 60 * 1000) {
        return cachedToken;
      }
      const authResp = await fetch(AUTH_URL + '/authenticate/api-key', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: apiKey }),
      });
      if (!authResp.ok) throw new Error('Invalid API key');
      const authData = await authResp.json();
      if (authData.status !== 'success' || !authData.data?.firebaseCustomToken) {
        throw new Error('Authentication failed');
      }
      const idResp = await fetch(
        'https://identitytoolkit.googleapis.com/v1/accounts:signInWithCustomToken?key=' + FIREBASE_API_KEY,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: authData.data.firebaseCustomToken, returnSecureToken: true }),
        }
      );
      if (!idResp.ok) throw new Error('Token exchange failed');
      const idData = await idResp.json();
      if (!idData.idToken) throw new Error('No ID token returned');
      cachedToken = idData.idToken;
      tokenExpiresAt = now + 55 * 60 * 1000;
      return cachedToken;
    }

    async function getItemData(token, itemId) {
      const query = `query GetItemData($id: String!) { itemData(id: $id) }`;
      const resp = await fetch(CONSOLE_API_URL, {
        method: 'POST',
        headers: { 'Authorization': token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, variables: { id: itemId } }),
      });
      if (!resp.ok) throw new Error('Failed to fetch item data');
      const result = await resp.json();
      if (result.errors?.length > 0) throw new Error(result.errors[0].message);
      return JSON.parse(result.data.itemData);
    }

    function stopPolling() {
      if (pollTimer) {
        clearInterval(pollTimer);
        pollTimer = null;
      }
      drawBtn.textContent = 'Watch';
      showClearDefault();
      renderItems();
    }

    async function fetchAndDrawAll() {
      const apiKey = (storedApiKey || apiKeyInput.value.trim());
      const checked = items.filter(i => i.checked);
      if (checked.length === 0) return;
      try {
        const token = await getIdToken(apiKey);
        for (const item of checked) {
          const data = await getItemData(token, item.id);
          const source = data?._ ?? data;
          const json = JSON.stringify(source);
          if (json !== lastDataJson[item.id]) {
            lastDataJson[item.id] = json;
            parent.postMessage({ pluginMessage: { type: 'draw', data: source, itemId: item.id } }, '*');
          }
        }
      } catch (err) {
        status.className = 'error';
        status.textContent = 'Error: ' + err.message;
        stopPolling();
      }
    }

    drawBtn.addEventListener('click', async () => {
      if (pollTimer) {
        stopPolling();
        status.className = '';
        status.textContent = '';
        return;
      }
      if (!storedApiKey) {
        status.className = 'error';
        status.textContent = 'Set an API key first.';
        return;
      }
      if (items.filter(i => i.checked).length === 0) {
        status.className = 'error';
        status.textContent = 'Check at least one item to watch.';
        return;
      }

      drawBtn.textContent = 'Stop';
      showClearDefault();
      renderItems();
      status.className = '';
      status.textContent = 'Watching for changes...';

      await fetchAndDrawAll();
      pollTimer = setInterval(fetchAndDrawAll, POLL_INTERVAL);
    });

    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      if (msg.type === 'init') {
        setApiKeyDisplay(msg.apiKey || '');
        items = Array.isArray(msg.items) ? msg.items : [];
        renderItems();
        return;
      }

      if (msg.type === 'draw-complete') {
        status.className = 'success';
        status.textContent = 'Drew ' + msg.count + ' from ' + msg.itemId;
      } else if (msg.type === 'error') {
        status.className = 'error';
        status.textContent = msg.message;
        stopPolling();
      }
    };
  </script>
</body>
</html>
